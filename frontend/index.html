<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ótica Express - Vitrine</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/store.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="mode-store">
    <!-- TOP BAR -->
    <header class="store-header">
        <div class="header-container">
            <div class="header-logo" onclick="window.location.href='index.html'">
                <div class="logo-box">
                    <span class="material-icons logo-icon">visibility</span>
                    <div class="logo-text">
                        <strong>Ótica</strong><span>Express</span>
                    </div>
                </div>
            </div>
            
            <div class="header-search">
                <div class="search-box">
                    <span class="material-icons search-icon">search</span>
                    <input type="text" id="inputPesquisar" placeholder="Pesquisar..." oninput="filtrarCatalogo()">
                </div>
            </div>

            <div class="header-actions">
                <button class="action-btn" title="Meus Pedidos" id="btnHeaderPedidos">
                    <span class="material-icons">assignment</span>
                </button>
                <button class="action-btn" title="Carrinho" onclick="window.location.href='Cliente/checkout.html'">
                    <span class="material-icons">shopping_cart</span>
                    <span class="cart-badge" id="carrinhoQuantidade">0</span>
                </button>
                <button class="action-btn user-btn" title="Minha Conta" id="btnHeaderUser">
                    <span class="material-icons">account_circle</span>
                    <span id="userNameHeader">Entrar</span>
                </button>
            </div>
        </div>
    </header>

    <div class="layout-container">
        <main class="main-content">
            <h1 class="view-title animate-fade">Promoções</h1>
            <div class="product-grid" id="catalogoGrid">
                <!-- Inserido via JS -->
            </div>
        </main>
    </div>

    <script src="auth.js"></script>
    <script src="index.js"></script>
</body>
</html>
